<!doctype html>
<meta charset="utf-8" />
<style>
  @font-face{
    font-family:'SourceHanSerifSC';
    src:url('{{ font_src }}') format('opentype');
    font-weight:200 900;
    font-style:normal;
    font-display:block;
  }
  @font-face{
    font-family:'Source Han Serif SC VF';
    src:url('{{ font_src }}') format('opentype');
    font-weight:200 900;
    font-style:normal;
    font-display:block;
  }
  @font-face{
    font-family:'Source Han Serif SC';
    src:url('{{ font_src }}') format('opentype');
    font-weight:200 900;
    font-style:normal;
    font-display:block;
  }

  :root{
    --page-width:  {{ page_width|default(540) }}px;
    --page-height: {{ min_height|default(2200) }}px;
    --pad: 30px;
    --title-size: {{ title_size|default(22.5) }}px;
    --body-size: {{ body_size|default(22.5) }}px;
    --column-width: calc(var(--page-width) - 2 * var(--pad));
    --brand-color: {{ brand_color|default('#57068c') }};
    --left-bar-color: {{ left_bar_color or brand_color }};
  }

  html,body{
    margin:0;
    background:#fff;
    color:#222;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    font-family:'Source Han Serif SC VF', 'SourceHanSerifSC', 'Source Han Serif SC', 'Source Han Serif CN', 'Noto Serif CJK SC', serif;
    font-weight:400;
    font-variation-settings:'wght' 400;
    font-synthesis:none;
  }

  hr{ display:none !important; height:0 !important; border:0 !important; }
  #page-root, #page-root *{
    border:0 !important; box-shadow:none !important; outline:none !important;
  }
  #page-root::before, #page-root::after{ content:none !important; display:none !important; }

  #page-root{
    width: var(--page-width);
    min-height: var(--page-height);
    margin: 0 auto;
    padding: var(--pad);
    box-sizing: border-box;
    position: relative;
    background:#fff;
  }

  .credits{
    position:absolute; right:var(--pad); top:var(--pad);
    font:10px/1.4 'Source Han Serif SC VF', 'SourceHanSerifSC', 'Source Han Serif SC', 'Source Han Serif CN', 'Noto Serif CJK SC', serif;
    color:#7a7a7a;
  }

  .title-row{
    display:flex; align-items:stretch; gap:12px; margin-bottom:18px;
    width: var(--column-width);
  }
  .title-marker{ display:flex; gap:8px; align-items:flex-start; }
  .title-marker .bar{
    width: 5.64102564px;
    background: var(--left-bar-color);
    border-radius:0; align-self:stretch;
  }
  .title-marker .label{
    font:10px/1 'Minion Pro','MinionPro-Regular','Times New Roman',serif;
    color: var(--brand-color);
    letter-spacing:2.5px;
  }

  h1.title{
    margin:0;
    font-family:'Source Han Serif SC VF', 'SourceHanSerifSC', 'Source Han Serif SC', 'Source Han Serif CN', 'Noto Serif CJK SC', serif;
    font-weight:500;
    font-variation-settings:'wght' 500;
    font-synthesis:none;
    font-size:var(--title-size);
    line-height:1.20;
    text-align:left;
    letter-spacing:2.25px;
  }

  .cover{
    margin:10px 0 14px 0;
    width: var(--column-width);
  }
  .cover img{ width:100%; height:auto; display:block; border-radius:0; }
  .cover figcaption{
    margin-top:6px;
    font:10px/1.4 'Source Han Serif SC VF', 'SourceHanSerifSC', 'Source Han Serif SC', 'Source Han Serif CN', 'Noto Serif CJK SC', serif; color:#666;
  }

  .content{
    width: var(--column-width);
    font-family:'Source Han Serif SC VF', 'SourceHanSerifSC', 'Source Han Serif SC', 'Source Han Serif CN', 'Noto Serif CJK SC', serif;
    font-weight:400;
    font-variation-settings:'wght' 400;
    font-size: var(--body-size);
    line-height:1.4;
    letter-spacing:2.25px;
    text-indent:0;
    text-align:left;
    line-break:strict;
    overflow-wrap:break-word;
    word-break:normal;
  }

  .content *{
    font-family: inherit;
    font-variation-settings: inherit;
  }

  .content p{
    margin:0 0 .95em 0;
  }
  .content p:last-child{ margin-bottom:0; }
</style>

<div id="page-root">
  {% if credits %}<div class="credits">{{ credits }}</div>{% endif %}

  <div class="title-row">
    <div class="title-marker">
      <span class="bar"></span>
      {% if marker_label %}<span class="label">{{ marker_label }}</span>{% endif %}
    </div>
    <h1 class="title">{{ title }}</h1>
  </div>

  {% if cover_image %}
  <figure class="cover">
    <img src="{{ cover_image }}" alt="cover" />
    {% if cover_caption %}<figcaption>{{ cover_caption }}</figcaption>{% endif %}
  </figure>
  {% endif %}

  <div class="content">
    {{ body|safe }}
  </div>
</div>
